<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ video.title }} · 인사이트</title>
  <style>
    :root {
      --bg:#0b1020; --card:#1a2238; --line:#283150;
      --txt:#e8ecf6; --muted:#9aa6c4; --brand:#4cc2ff; --brand2:#7b61ff;
    }
    * { box-sizing:border-box; }
    body { font-family:-apple-system,"Segoe UI",Roboto,sans-serif; margin:0; color:var(--txt);
      background:radial-gradient(1200px 600px at 80% -10%, #1d2540 0, transparent 60%), var(--bg); min-height:100vh; }
    .wrap { max-width:880px; margin:0 auto; padding:0 1.2rem 4rem; }
    .hero { background:linear-gradient(120deg,var(--brand2),var(--brand)); padding:1.6rem 0; margin-bottom:1.6rem; }
    .hero .wrap { display:flex; justify-content:space-between; align-items:center; }
    .back { color:#fff; text-decoration:none; font-weight:600; opacity:.9; }
    .top { display:flex; gap:1rem; margin-bottom:1.4rem; }
    .top img { width:220px; height:124px; object-fit:cover; border-radius:12px; }
    h1 { font-size:1.3rem; margin:.2rem 0 .5rem; line-height:1.35; }
    .badge { display:inline-block; font-size:.72rem; font-weight:700; padding:.2rem .6rem; border-radius:999px; color:#fff; background:#555f7e; }
    .yt { color:var(--brand); font-size:.85rem; }
    h2 { font-size:1.05rem; margin:1.6rem 0 .6rem; color:var(--brand); }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:1rem 1.2rem; line-height:1.6; white-space:pre-wrap; color:var(--txt); }
    .cats { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .cat { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:1rem 1.2rem; }
    .cat h3 { margin:0 0 .5rem; font-size:.95rem; color:var(--brand); }
    .cat .body { color:var(--muted); font-size:.9rem; line-height:1.6; white-space:pre-wrap; }
    details summary { cursor:pointer; color:var(--muted); }
    @media(max-width:600px){ .cats{grid-template-columns:1fr} .top{flex-direction:column} .top img{width:100%;height:auto} }
  </style>
</head>
<body>
  <div class="hero"><div class="wrap"><a class="back" href="/">← 목록</a></div></div>
  <div class="wrap">
    <div class="top">
      <img src="https://i.ytimg.com/vi/{{ video.id }}/mqdefault.jpg" alt="">
      <div>
        <span class="badge">{{ video.channel }}</span>
        <h1>{{ video.title }}</h1>
        <a class="yt" href="{{ video.url }}" target="_blank" rel="noopener">▶ YouTube에서 보기</a>
      </div>
    </div>

    <h2>요약</h2>
    <div class="panel">{{ video.summary }}</div>

    <h2>인사이트</h2>
    <div class="cats">
      {% for s in video.sections %}
      <div class="cat"><h3>{{ s.title }}</h3><div class="body">{{ s.body }}</div></div>
      {% endfor %}
    </div>

    <h2>전체 원문{% if video.source == "description" %} <span style="font-size:.75rem;color:var(--muted)">(자막 차단 → 영상 설명 기반)</span>{% endif %}</h2>
    <details><summary>원문 펼치기</summary><div class="panel" style="margin-top:.6rem">{{ video.transcript }}</div></details>
  </div>
</body>
</html>
